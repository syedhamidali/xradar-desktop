# ruff.toml — Python linting configuration for xradar-desktop engine
target-version = "py310"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E402",   # module-level imports after sys.path manipulation (needed for sidecar)
]

[lint.per-file-ignores]
"python/tests/**" = ["E501"]
"python/server.py" = ["E402"]
